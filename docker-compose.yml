services:
  postgres:
    image: postgres:18
    container_name: warehouse-exec-postgres
    environment:
      POSTGRES_DB: warehouse_exec_db
      POSTGRES_USER: warehouse_exec_user
      POSTGRES_PASSWORD: warehouse_exec_pass
    ports:
      - "5432:5432"
    volumes:
      - warehouse-exec-postgres-data:/var/lib/postgresql/data

volumes:
  warehouse-exec-postgres-data: