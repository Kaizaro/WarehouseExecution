services:
  postgres:
    image: postgres:18
    container_name: warehouse-exec-postgres
    environment:
      POSTGRES_DB: warehouse_exec_db
      POSTGRES_USER: warehouse_exec_user
      POSTGRES_PASSWORD: warehouse_exec_pass
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_exec_user -d warehouse_exec_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - warehouse-exec-postgres-data:/var/lib/postgresql

  api:
    build:
      context: .
      dockerfile: Api/Dockerfile
    container_name: warehouse-exec-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__WarehouseExecutionDb: Host=postgres;Port=5432;Database=warehouse_exec_db;Username=warehouse_exec_user;Password=warehouse_exec_pass
      Grpc__WorkerUrl: http://worker:8081
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: Worker/Dockerfile
    container_name: warehouse-exec-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__WarehouseExecutionDb: Host=postgres;Port=5432;Database=warehouse_exec_db;Username=warehouse_exec_user;Password=warehouse_exec_pass
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

volumes:
  warehouse-exec-postgres-data:
